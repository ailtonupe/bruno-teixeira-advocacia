backend:
  name: git-gateway
  branch: main

site_url: https://bruno-teixeira-advocacia.netlify.app
display_url: https://bruno-teixeira-advocacia.netlify.app

media_folder: public/imagens
public_folder: /imagens

locale: pt

collections:
  - name: artigos
    label: Artigos
    label_singular: Artigo
    folder: artigos
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: Título
        name: title
        widget: string
        hint: "O título do artigo que aparecerá no site"

      - label: Data de Publicação
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false

      - label: Resumo
        name: resumo
        widget: text
        hint: "Breve descrição do artigo (aparece na listagem)"

      - label: Categoria
        name: categoria
        widget: select
        options:
          - { label: "Direito Trabalhista", value: "trabalhista" }
          - { label: "Direito Cível", value: "civel" }
          - { label: "Direito Previdenciário", value: "previdenciario" }
          - { label: "Direito Criminal", value: "criminal" }
          - { label: "Dicas Jurídicas", value: "dicas" }
        default: "trabalhista"

      - label: Imagem de Capa
        name: capa
        widget: image
        required: false
        hint: "Opcional — foto de capa para o artigo (JPG ou PNG)"

      - label: Conteúdo
        name: body
        widget: markdown
        hint: "Escreva o conteúdo completo do artigo aqui"